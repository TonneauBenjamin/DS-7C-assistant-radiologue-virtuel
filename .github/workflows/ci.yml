name: basic-ci
on: [push, pull_request]
jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      # Dépendances minimales des tests smoke (l'inférence MedGemma, GPU,
      # n'est pas exécutée en CI : l'API répond 503 sans CUDA).
      - run: pip install pytest fastapi httpx python-multipart pillow segno numpy
      - run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q
